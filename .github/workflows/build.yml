name: Build Canary

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Install and Build
      working-directory: MaiChartManager/Front
      run: |
        pnpm install
        pnpm build

    - name: Upload wwwroot
      uses: actions/upload-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

  build:
    name: Build
    runs-on: windows-latest
    needs: build-frontend
    
    steps:
    - run: git config --global core.longPaths true
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download wwwroot
      uses: actions/download-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish
      shell: powershell
      run: |
        dotnet build XV2-Tools/Xv2CoreLib/Xv2CoreLib.csproj -c Release
        dotnet build XV2-Tools/LB_Common/LB_Common.csproj -c Release
        dotnet build SonicAudioTools/Source/SonicAudioLib/SonicAudioLib.csproj -c Release
        
        dotnet publish MaiChartManager/MaiChartManager.csproj -c Crack -p:OutputPath=./publish/
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaiChartManager-Crack
        path: ./publish
