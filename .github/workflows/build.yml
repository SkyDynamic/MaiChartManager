name: Build Canary

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Install and Build
      working-directory: MaiChartManager/Front
      run: |
        pnpm install
        pnpm build

    - name: Upload wwwroot
      uses: actions/upload-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

  build:
    name: Build
    runs-on: windows-latest
    needs: build-frontend
    
    steps:
    - run: git config --global core.longPaths true
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download wwwroot
      uses: actions/download-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

    # --- 修改开始 ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 请根据你的项目实际版本修改，如 6.0.x 或 9.0.x

    - name: Build and Publish
      shell: powershell
      run: |
        dotnet publish MaiChartManager/MaiChartManager.csproj -c Crack -p:Configuration=Release -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaiChartManager-Crack
        path: ./publish
    # --- 修改结束 ---

    # 注意：这里删除了原本删除 wwwroot artifact 的步骤
    # 因为 wwwroot 已经被打包进 ./publish 目录中，不再需要单独处理或清理
