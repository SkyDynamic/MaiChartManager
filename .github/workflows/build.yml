name: Build Canary

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Install and Build
      working-directory: MaiChartManager/Front
      run: |
        pnpm install
        pnpm build

    - name: Upload wwwroot
      uses: actions/upload-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

  build:
    name: Build
    runs-on: windows-latest
    needs: build-frontend
    
    steps:
    - run: git config --global core.longPaths true
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download wwwroot
      uses: actions/download-artifact@v4
      with:
        name: wwwroot
        path: MaiChartManager/wwwroot

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build and Publish
      shell: powershell
      run: |
        # 定义需要修复的项目文件路径
        $projects = @(
          "AquaMai/AquaMai.Config.HeadlessLoader/AquaMai.Config.HeadlessLoader.csproj",
          "MaiLib/MaiLib.csproj",
          "SimaiSharp/SimaiSharp/SimaiSharp.csproj",
          "MuConvert/MuConvert.csproj",
          "SonicAudioTools/Source/SonicAudioLib/SonicAudioLib.csproj",
          "XV2-Tools/LB_Common/LB_Common.csproj",
          "XV2-Tools/Xv2CoreLib/Xv2CoreLib.csproj"
        )
        
        # 定义要注入的 XML 配置（为 Crack 配置指定输出路径）
        $crackConfig = @'
          <PropertyGroup Condition="'$(Configuration)|$(Platform)'=='Crack|AnyCPU'">
            <OutputPath>bin\Crack\</OutputPath>
          </PropertyGroup>
        '@
        
        # 遍历所有项目，将 Crack 配置注入到 .csproj 文件中
        foreach ($proj in $projects) {
          $content = Get-Content $proj -Raw
          # 检查是否已经包含 Crack 配置，如果没有则注入
          if ($content -notmatch "Configuration.*==.*'Crack") {
            $content = $content -replace '</Project>', "$crackConfig`n</Project>"
            Set-Content -Path $proj -Value $content -NoNewline
            Write-Host "已为 $proj 注入 Crack 配置"
          }
        }
        
        dotnet build AquaMai/AquaMai.Config.HeadlessLoader/AquaMai.Config.HeadlessLoader.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build MaiLib/MaiLib.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build SimaiSharp/SimaiSharp/SimaiSharp.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build MuConvert/MuConvert.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build SonicAudioTools/Source/SonicAudioLib/SonicAudioLib.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build XV2-Tools/LB_Common/LB_Common.csproj -c Release -p:OutputPath=bin/Crack/
        dotnet build XV2-Tools/Xv2CoreLib/Xv2CoreLib.csproj -c Release -p:OutputPath=bin/Crack/
        
        dotnet publish MaiChartManager/MaiChartManager.csproj -c Crack -o ./publish
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaiChartManager-Crack
        path: ./publish
